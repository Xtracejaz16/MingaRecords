<!DOCTYPE html>
<html class="scroll-smooth" lang="es">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>MINGA RECORDS | El Ritmo Nació Aquí</title>
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            obsidian: '#0F0A00',
            muiscaGold: '#C8860A',
            taironaTerracotta: '#8B2500',
            koguiCream: '#F2E8D0',
            zenuCopper: '#B5651D',
            emberaNavy: '#1A2340',
            wayuuJade: '#1A7A6E',
            surface: '#0F0A00',
            primary: '#C8860A',
            secondary: '#8B2500',
            'on-background': '#F2E8D0',
            outline: '#514535',
          },
          fontFamily: {
            headline: ['Cinzel', 'serif'],
            body: ['Crimson Pro', 'serif'],
            label: ['Crimson Pro', 'serif'],
            cinzel: ['Cinzel', 'serif'],
            crimson: ['Crimson Pro', 'serif'],
          },
        }
      }
    }
  </script>
  <style>
    .pattern-vueltiao {
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0L60 30L30 60L0 30L30 0ZM30 10L50 30L30 50L10 30L30 10Z' fill='%23F2E8D0' fill-opacity='0.04'/%3E%3C/svg%3E");
    }
    .solar-emblem {
      animation: rotateSolar 20s linear infinite;
    }
    @keyframes rotateSolar {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.8s ease-out;
    }
    .reveal.active {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body class="bg-obsidian text-koguiCream font-crimson overflow-x-hidden">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
